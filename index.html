<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI Travel Planner - Upload your travel documents and get AI-powered itineraries" />
    <title>AI Travel Planner</title>
    <script>
      (function() {
        // Dark-theme only
        var t = 'dark';
        var vars = { '--color-bg':'15 23 42','--color-surface':'30 41 59','--color-surface-2':'51 65 85','--color-text-1':'248 250 252','--color-text-2':'148 163 184','--color-text-3':'100 116 139','--color-border':'51 65 85' };
        var root = document.documentElement;
        // Clear any previously persisted theme classes/attrs
        root.classList.remove('dark', 'light');
        root.setAttribute('data-theme', t);
        root.classList.add(t);
        Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
        root.style.colorScheme = t;
        try { localStorage.setItem('theme', 'dark'); } catch(e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
